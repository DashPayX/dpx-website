      --text-main: #E5E7EB;

    * {

      margin: 0;

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 20px;

    /* NAV */

    header {
      position: sticky;
      top: 0;
      z-index: 50;

    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-sphere {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 20%, #FFFFFF 0%, #E2E8F0 14%, #6477FF 40%, #7C3AED 70%, #111827 100%);
      box-shadow:
        0 0 26px rgba(124, 58, 237, 0.7),
        0 0 40px rgba(15, 23, 42, 0.9);
    }

    .nav-title {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.02em;
    }

    .nav-tag {
      font-size: 12px;
      color: var(--text-muted);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 13px;
    }

    .nav-links a {
      color: var(--text-muted);
      font-weight: 500;
    }

    .nav-links a:hover {
      color: var(--primary-start);
    }

    .nav-cta {
      padding: 8px 16px;
      border-radius: 999px;
      background: radial-gradient(circle at 0% 0%, #22C55E 0%, #15803D 45%, #14532D 100%);
      color: #ECFDF5;
      font-size: 12px;
      font-weight: 600;

      border: 1px solid rgba(74, 222, 128, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
